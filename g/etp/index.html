<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="title" content="Ruffle Example">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="language" content="English">
  <title>Ruffle Example</title>
  <noscript>Your browser doesn't have JavaScript enabled. Please enable JavaScript or switch to a browser that supports it.</noscript>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #ruffle { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="ruffle" class="gameloc"></div>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <script>
    var swfobject = {};
    swfobject.embedSWF = function(url, cont) {
      window.addEventListener("load", function () {
        var ruffle = window.RufflePlayer.newest();
        var player = ruffle.createPlayer();
        player.style.width = "100vw";
        player.style.height = "100vh";
        document.getElementById(cont).appendChild(player);
        player.load({ url: url });
      });
    };

    swfobject.embedSWF("../swf/henry-stickmin-escaping-the-prison.swf", "ruffle", 800, 600);
  </script>
</body>
</html>
