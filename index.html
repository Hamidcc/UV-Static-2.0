<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ultralearn</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,system-ui;
  background:#111;
  color:#fff;
  min-height:100vh;
}
header{
  padding:28px 56px;
  display:flex;
  justify-content:center;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.search{
  width:100%;
  max-width:720px;
}
.search input{
  width:100%;
  padding:14px 18px;
  font-size:15px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,0.15);
  background:#1a1a1a;
  color:#fff;
  outline:none;
}
.search input:focus{
  border-color:#E50914;
}
main{
  padding:48px 56px 80px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:26px;
}
.card{
  position:relative;
  cursor:pointer;
}
.card-img{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  border-radius:6px;
  overflow:hidden;
  background:#1f1f1f;
}
.card-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform .35s ease, filter .35s ease;
}
.card-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.75);
  opacity:0;
  padding:18px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  transition:opacity .3s ease;
}
.card-desc{
  font-size:13px;
  line-height:1.5;
  color:#ddd;
}
.card-title{
  margin-top:12px;
  font-size:14px;
  font-weight:600;
  opacity:0;
  transform:translateY(-6px);
  transition:opacity .25s ease, transform .25s ease;
}
.card:hover img{
  transform:scale(1.05);
  filter:brightness(.4);
}
.card:hover .card-overlay{
  opacity:1;
}
.card:hover .card-title{
  opacity:1;
  transform:translateY(0);
}
.empty{
  text-align:center;
  padding:80px 0;
  color:#666;
  font-size:14px;
}
@media(max-width:900px){
  header{padding:20px}
  main{padding:32px 20px}
}
</style>
</head>
<body>

<header>
   <h1> UltraLearn</h1>
  <div class="search">
    <input type="text" id="search" placeholder="Search games...">
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">No games found.</div>
</main>

<script>
const GAMES = [];

function esc(s){
  return String(s)
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;");
}

function buildCard(game){
  const div=document.createElement("div");
  div.className="card";
  const image = game.icon && game.icon.trim()
    ? `<img src="${esc(game.icon)}" alt="${esc(game.title)}">`
    : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#222;color:#555;font-size:12px;">No Image</div>`;
  div.innerHTML=`
    <div class="card-img">
      ${image}
      <div class="card-overlay">
        <div class="card-desc">${esc(game.description)}</div>
      </div>
    </div>
    <div class="card-title">${esc(game.title)}</div>
  `;
  div.addEventListener("click",()=>{
    if(game.file) location.href=game.file;
  });
  return div;
}

function render(list){
  const grid=document.getElementById("grid");
  const empty=document.getElementById("empty");
  grid.innerHTML="";
  if(!list.length){
    empty.style.display="block";
    return;
  }
  empty.style.display="none";
  list.forEach(g=>grid.appendChild(buildCard(g)));
}

document.getElementById("search").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();
  const filtered=GAMES.filter(g=>
    g.title.toLowerCase().includes(q)||
    g.description.toLowerCase().includes(q)
  );
  render(filtered);
});

(async function init(){
  let games=[];
  try{
    const r=await fetch("./games.json");
    if(r.ok) games=await r.json();
  }catch{}
  if(!games.length) games=GAMES;
  window.GAMES=games;
  render(games);
})();
</script>

</body>
</html>
