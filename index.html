<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UltraLearn</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,system-ui;
  background:#111;
  color:#fff;
  min-height:100vh;
  transition:background .3s ease,color .3s ease;
  background-size:cover;
  background-position:center;
}
header{
  padding:28px 56px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.search{width:100%;max-width:720px;}
.search input{
  width:100%;
  padding:14px 18px;
  font-size:15px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,0.15);
  background:#1a1a1a;
  color:#fff;
  outline:none;
}
.search input:focus{border-color:#E50914}
.settings-btn{
  position:fixed;
  top:20px;
  right:20px;
  padding:10px 14px;
  background:#222;
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
  cursor:pointer;
  border-radius:6px;
}
.settings-panel{
  position:fixed;
  top:0;
  right:-340px;
  width:320px;
  height:100%;
  background:#181818;
  padding:24px;
  transition:right .3s ease;
  z-index:1000;
  overflow-y:auto;
}
.settings-panel.active{right:0}
.settings-panel h2{margin-bottom:18px;font-size:18px}
.theme-btn{
  display:block;
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}
main{padding:48px 56px 80px}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:26px;
}
.card{cursor:pointer}
.card-img{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  border-radius:6px;
  overflow:hidden;
  background:#1f1f1f;
}
.card-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform .35s ease, filter .35s ease;
}
.card-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.75);
  opacity:0;
  padding:18px;
  display:flex;
  align-items:flex-end;
  transition:opacity .3s ease;
}
.card-title{
  margin-top:12px;
  font-size:14px;
  font-weight:600;
  opacity:0;
  transform:translateY(-6px);
  transition:opacity .25s ease, transform .25s ease;
}
.card:hover img{
  transform:scale(1.05);
  filter:brightness(.4);
}
.card:hover .card-overlay{opacity:1}
.card:hover .card-title{
  opacity:1;
  transform:translateY(0);
}
.empty{
  text-align:center;
  padding:80px 0;
  color:#666;
}
.light{
  background:#f4f4f4;
  color:#111;
}
.light .search input{
  background:#fff;
  color:#111;
}
.blue{background:#0f172a}
.green{background:#062e1f}

  .settings-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.close-settings {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 30px;
  height: 30px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}

.close-settings:hover {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
}
</style>
</head>
<body>

<button class="settings-btn" onclick="toggleSettings()">⚙</button>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h3>Settings</h3>
    <button class="close-settings" onclick="closeSettings()">✕</button>
  </div>

  <h3>Theme</h3>
  <button class="theme-btn" onclick="setTheme('dark')">Dark</button>
  <button class="theme-btn" onclick="setTheme('light')">Light</button>
  <button class="theme-btn" onclick="setTheme('blue')">Ocean Blue</button>
  <button class="theme-btn" onclick="setTheme('green')">Forest</button>
  <button class="theme-btn" onclick="setTheme('purple')">Purple</button>
  <hr>
  <h3>Background Image</h3>
  <input type="file" accept="image/*" onchange="setCustomBackground(event)">
  <button class="theme-btn" onclick="clearBackground()">✕ Remove Background</button>
</div>

<header>
  <h1>UltraLearn</h1>
  <div class="search">
    <input type="text" id="search" placeholder="Search games...">
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">No games found.</div>
</main>

<script>
if(!document.cookie.includes("authorized=1")){
  location.href="welcome.html";
}

function toggleSettings(){
  document.getElementById("settingsPanel").classList.toggle("active");
}
function setTheme(theme) {
    document.body.className = "";
    if (theme !== "dark") document.body.classList.add(theme);
    localStorage.setItem("theme", theme);
}

function setCustomBackground(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function () {
        const imageUrl = `url(${reader.result})`;
        document.body.style.backgroundImage = imageUrl;
        localStorage.setItem("customBg", reader.result);
    };
    reader.readAsDataURL(file);
}

function clearBackground() {
    document.body.style.backgroundImage = "";
    localStorage.removeItem("customBg");
}

(function loadSettings() {
    const theme = localStorage.getItem("theme");
    const bg = localStorage.getItem("customBg");

    if (theme) setTheme(theme);
    if (bg) document.body.style.backgroundImage = `url(${bg})`;
})();

function closeSettings() {
    document.getElementById("settingsPanel").classList.remove("active");
}
const GAMES=[];

function esc(s){
  return String(s)
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;");
}

    </div>
    <div class="card-title">${esc(game.title)}</div>
  `;

  div.addEventListener("click",()=>{
    if(game.id) location.href="educate.html/?id="+encodeURIComponent(game.id);
  });

  return div;
}

function render(list){
  const grid=document.getElementById("grid");
  const empty=document.getElementById("empty");
  grid.innerHTML="";
  if(!list.length){empty.style.display="block";return;}
  empty.style.display="none";
  list.forEach(g=>grid.appendChild(buildCard(g)));
}

document.getElementById("search").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();
  const filtered=window.GAMES.filter(g=>
    g.title.toLowerCase().includes(q)||
    g.description.toLowerCase().includes(q)
  );
  render(filtered);
});

(async function init(){
  let games=[];
  try{
    const r=await fetch("./games.json");
    if(r.ok) games=await r.json();
  }catch{}
  if(!games.length) games=GAMES;
  window.GAMES=games;
  render(games);
})();
</script>

</html>
