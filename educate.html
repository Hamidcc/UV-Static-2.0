<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UltraLearn | Educate</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,system-ui;
  background:#111;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  transition:background .3s ease,color .3s ease;
  background-size:cover;
  background-position:center;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
  background:#181818;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.topbar button{
  background:#222;
  color:#fff;
  border:1px solid rgba(255,255,255,.15);
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}
.container{
  flex:1;
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:20px;
}
.credits{
  background:#1b1b1b;
  padding:16px;
  border-radius:8px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.credit-row{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:14px;
}
.credit-row img{
  width:22px;
  height:22px;
}
.iframe-wrap{
  flex:1;
  background:#000;
  border-radius:8px;
  overflow:hidden;
  position:relative;
}
iframe{
  width:100%;
  height:100%;
  border:none;
}
.description{
  background:#1b1b1b;
  padding:16px;
  border-radius:8px;
  font-size:14px;
  line-height:1.6;
}
.settings-panel{
  position:fixed;
  top:0;
  right:-320px;
  width:300px;
  height:100%;
  background:#181818;
  padding:20px;
  transition:right .3s ease;
  z-index:1000;
}
.settings-panel.active{right:0}
.theme-btn{
  display:block;
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}
.light{background:#f4f4f4;color:#111}
.light .topbar{background:#fff;color:#111}
.blue{background:#0f172a}
.green{background:#062e1f}
</style>
</head>
<body>

<div class="topbar">
  <button onclick="goBack()">← Back</button>
  <div>
    <button onclick="toggleSettings()">⚙</button>
    <button onclick="goFullscreen()">⛶</button>
  </div>
</div>

<div class="container">
  <div class="credits" id="credits"></div>
  <div class="iframe-wrap">
    <iframe id="gameFrame"></iframe>
  </div>
  <div class="description" id="description"></div>
</div>

<div class="settings-panel" id="settingsPanel">
  <h3 style="margin-bottom:15px;">Appearance</h3>
  <button class="theme-btn" onclick="setTheme('dark')">Dark</button>
  <button class="theme-btn" onclick="setTheme('light')">Light</button>
  <button class="theme-btn" onclick="setTheme('blue')">Blue</button>
  <button class="theme-btn" onclick="setTheme('green')">Green</button>
  <hr style="margin:20px 0;border:0;border-top:1px solid #333">
  <input type="file" accept="image/*" onchange="setCustomBackground(event)">
  <button class="theme-btn" onclick="clearBackground()">Remove Background</button>
</div>

<script>
if(!document.cookie.includes("authorized=1")){
  location.href="welcome.html";
}

function goBack(){
  history.back();
}

function toggleSettings(){
  document.getElementById("settingsPanel").classList.toggle("active");
}

function goFullscreen(){
  const iframe=document.getElementById("gameFrame");
  if(iframe.requestFullscreen) iframe.requestFullscreen();
}

function setTheme(theme){
  document.body.className="";
  if(theme!=="dark") document.body.classList.add(theme);
  localStorage.setItem("theme",theme);
}

function setCustomBackground(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(){
    document.body.style.backgroundImage=`url(${reader.result})`;
    localStorage.setItem("customBg",reader.result);
  };
  reader.readAsDataURL(file);
}

function clearBackground(){
  document.body.style.backgroundImage="";
  localStorage.removeItem("customBg");
}

(function loadSettings(){
  const theme=localStorage.getItem("theme");
  const bg=localStorage.getItem("customBg");
  if(theme) setTheme(theme);
  if(bg) document.body.style.backgroundImage=`url(${bg})`;
})();

function getParam(name){
  return new URLSearchParams(location.search).get(name);
}

  const id=getParam("id");
  if(!id) return location.href="index.html";
  let games=[];

    const r=await fetch("./games.json");
    if(r.ok) games=await r.json();
  }catch{}
