<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UltraLearn | Educate</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --text: #e8e8f0;
    --muted: #7070a0;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.3s, color 0.3s;
    background-size: cover;
    background-position: center;
  }

  /* ── TOPBAR ── */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 28px;
    height: 60px;
    background: rgba(10,10,15,0.85);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: white;
    /* background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%); */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    user-select: none;
  }

  .topbar-right {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0 14px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, border-color 0.15s;
  }

  .icon-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── MAIN LAYOUT ── */
  .page {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 28px 32px;
    gap: 20px;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── GAME FRAME ── */
  .game-wrap {
    width: 100%;
    /* 16:9 aspect ratio but fills most of viewport height */
    aspect-ratio: 16 / 9;
    max-height: calc(100vh - 180px);
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    /* box-shadow: 0 0 60px rgba(108,99,255,0.12); */
    position: relative;
  }

  .game-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── BOTTOM ROW ── */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 16px;
  }

  @media (max-width: 700px) {
    .bottom-row { grid-template-columns: 1fr; }
    .page { padding: 14px 14px 24px; }
  }

  /* ── CREDITS ── */
  .credits-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .credits-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .credit-source {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .credit-source img {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    opacity: 0.85;
  }

  .credit-source span {
    font-size: 13px;
    color: var(--muted);
  }

  .credit-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .credit-author {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }

  .divider {
    height: 1px;
    background: var(--border);
  }

  /* ── DESCRIPTION ── */
  .description-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
    font-size: 14px;
    line-height: 1.75;
    color: #b0b0c8;
  }

  .description-card .desc-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* ── SETTINGS PANEL ── */
  .settings-panel {
    position: fixed;
    top: 0;
    right: -340px;
    width: 300px;
    height: 100%;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 24px 20px;
    transition: right 0.3s cubic-bezier(.4,0,.2,1);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
  }

  .settings-panel.active { right: 0; }

  .settings-panel h3 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .theme-btn {
    display: block;
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
  }

  .theme-btn:hover { border-color: var(--accent); background: rgba(108,99,255,0.12); }

  .settings-panel hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 6px 0;
  }

  input[type=file] {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--muted);
    width: 100%;
  }

  /* ── THEMES ── */
  body.light {
    --bg: #f0f0f5;
    --surface: #fff;
    --surface2: #e8e8f0;
    --border: rgba(0,0,0,0.08);
    --text: #111;
    --muted: #888;
    --accent: #5a52e0;
  }

  body.blue {
    --bg: #050e1f;
    --surface: #0a1628;
    --surface2: #0f1f38;
    --accent: #38bdf8;
  }

  body.green {
    --bg: #040f08;
    --surface: #081a0d;
    --surface2: #0d2614;
    --accent: #34d399;
  }

  body.purple {
    --bg: #0d0916;
    --surface: #160f24;
    --surface2: #1e1434;
    --accent: #c084fc;
  }
.settings-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.close-settings {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 30px;
  height: 30px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}

.close-settings:hover {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:18px;">
    <button class="icon-btn" onclick="goBack()">← Home</button>
    <span class="logo">UltraLearn</span>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" onclick="toggleSettings()">⚙ Settings</button>
    <button class="icon-btn" onclick="goFullscreen()">⛶ Fullscreen</button>
  </div>
</div>

<div class="page">
  <div class="game-wrap">
    <iframe id="gameFrame" allowfullscreen></iframe>
  </div>

  <div class="bottom-row">
    <div class="credits-card" id="credits"></div>
    <div class="description-card">
      <div class="desc-label">About this game</div>
      <div id="description"></div>
    </div>
  </div>
</div>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h3>Settings</h3>
    <button class="close-settings" onclick="closeSettings()">✕</button>
  </div>

  <h3>Theme</h3>
  <button class="theme-btn" onclick="setTheme('dark')">Dark</button>
  <button class="theme-btn" onclick="setTheme('light')">Light</button>
  <button class="theme-btn" onclick="setTheme('blue')">Ocean Blue</button>
  <button class="theme-btn" onclick="setTheme('green')">Forest</button>
  <button class="theme-btn" onclick="setTheme('purple')">Purple</button>
  <hr>
  <h3>Background Image</h3>
  <input type="file" accept="image/*" onchange="setCustomBackground(event)">
  <button class="theme-btn" onclick="clearBackground()">✕ Remove Background</button>
</div>
  
<script>
if(!document.cookie.includes("authorized=1")){
  location.href="welcome.html";
}

function goBack(){ history.back(); }

function toggleSettings(){
  document.getElementById("settingsPanel").classList.toggle("active");
}

function goFullscreen(){
  const iframe = document.getElementById("gameFrame");
  if(iframe.requestFullscreen) iframe.requestFullscreen();
}

function setTheme(theme){
  document.body.className = "";
  if(theme !== "dark") document.body.classList.add(theme);
  localStorage.setItem("theme", theme);
}

function setCustomBackground(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    document.body.style.backgroundImage = `url(${reader.result})`;
    localStorage.setItem("customBg", reader.result);
  };
  reader.readAsDataURL(file);
}

function clearBackground(){
  document.body.style.backgroundImage = "";
  localStorage.removeItem("customBg");
}

(function loadSettings(){
  const theme = localStorage.getItem("theme");
  const bg = localStorage.getItem("customBg");
  if(theme) setTheme(theme);
  if(bg) document.body.style.backgroundImage = `url(${bg})`;
})();

function getParam(name){
  return new URLSearchParams(location.search).get(name);
}

function gothicText(t){
  if(!t) return "";
  return t
    .replace(/i/g,"𝔦")
    .replace(/e/g,"𝔢")
    .replace(/a/g,"𝔞");
}

(async function init(){
  const id = getParam("id");
  if(!id) return location.href = "index.html";

  let games = [];
  try{
    const r = await fetch("./games.json");
    if(r.ok) games = await r.json();
  }catch{}

  const game = games.find(g => String(g.id) === String(id));
  if(!game) return location.href = "index.html";

  const frame = document.getElementById("gameFrame");

  if(game.file && game.file.toLowerCase().endsWith(".swf")){
    frame.srcdoc = `
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruffle Example</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
#ruffle{width:100vw;height:100vh;}
</style>
</head>
<body>
<div id="ruffle"></div>
<script src="https://unpkg.com/@ruffle-rs/ruffle"><\/script>
<script>
var swfobject={};
swfobject.embedSWF=function(url,cont){
window.addEventListener("load",function(){
var ruffle=window.RufflePlayer.newest();
var player=ruffle.createPlayer();
player.style.width="100vw";
player.style.height="100vh";
document.getElementById(cont).appendChild(player);
player.load({url:url});
});
};
swfobject.embedSWF("${game.file}","ruffle",800,600);
<\/script>
</body>
</html>
`;
  }else{
    frame.src = game.file || "";
  }

  const title = gothicText(game.title || "Untitled");
  const description = gothicText(game.description || "No description available.");

  document.getElementById("credits").innerHTML = `
    <div class="credits-label">Credits</div>
    <div class="credit-title">${title}</div>
    <div class="credit-author">by ${game.author || "Unknown Author"}</div>
    <div class="divider"></div>
    <div class="credit-source">
      <span> 🎲 Sourced from Itch.io</span>
    </div>
    <div style="font-size:12px;color:var(--muted);line-height:1.5;">Thank you to the creators who made the software.</div>
  `;

  document.getElementById("description").textContent = description;
})();

function closeSettings(){
  document.getElementById("settingsPanel").classList.remove("active");
}
</script>

</body>
</html>
